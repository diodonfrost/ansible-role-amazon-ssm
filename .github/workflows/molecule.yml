name: molecule

on:
  push:
  pull_request:
  schedule:
    - cron: '0 18 * * sun'

jobs:
  test:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    env:
      docker_namespace: ghcr.io/diodonfrost/docker-ansible
    strategy:
      fail-fast: false
      matrix:
        image:
          - almalinux:10
          - rockylinux:9
          - oraclelinux:10
          - amazonlinux:2023
          - fedora:43
          - debian:13
          - debian:12
          - ubuntu:26.04
          - ubuntu:24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Install Molecule
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Block fake aws metadata
        run: sudo iptables -t nat -I PREROUTING -p tcp -d 169.254.169.254 --dport 80 -j DNAT --to-destination 127.0.0.1

      - name: Test Ansible role
        run: molecule test
        env:
          namespace: ${{ env.docker_namespace }}
          image: ansible-${{ matrix.image }}

      - name: Test Ansible role with check_mode enable
        run: molecule check
        env:
          namespace: ${{ env.docker_namespace }}
          image: ansible-${{ matrix.image }}
