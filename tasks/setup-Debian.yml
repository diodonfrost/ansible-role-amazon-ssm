---
# Install aws ssm agent on Debian family system

- name: Debian | Install aws ssm agent
  ansible.builtin.apt:
    deb: "{{ ssm_package_url }}"
    state: present

- name: Debian | Manage aws ssm agent service
  ansible.builtin.service:
    name: "{{ ssm_service }}"
    state: started
    enabled: true
